<section class="side-note editorial-glass-note" data-side-note="feedback">
  <h2>即时反馈</h2>
  <p>这些按钮会在反馈服务可用时同步更新画像；即使脚本不可用也不会影响阅读。</p>
  <div>
    <button type="button" data-feedback-value="like">喜欢</button>
    <button type="button" data-feedback-value="dislike">不喜欢</button>
    <button type="button" data-feedback-value="bookmark">收藏</button>
  </div>
  <div class="reason-tags" aria-label="反馈原因标签">
    <button type="button" data-reason-tag="继续追踪">继续追踪</button>
    <button type="button" data-reason-tag="太基础了">太基础了</button>
    <button type="button" data-reason-tag="想看更深度">想看更深度</button>
  </div>
  <p class="meta" data-feedback-status>反馈会在这里显示状态更新。</p>
</section>
